version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: fz152_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-fz152_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-fz152_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - fz152_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fz152_user} -d ${DB_NAME:-fz152_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fz152_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-fz152_user}:${DB_PASSWORD:-secure_password_change_me}@db:5432/${DB_NAME:-fz152_db}?schema=public
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fz152_network
    volumes:
      - ./backend:/app
      - /app/node_modules
      - tmp_data:/app/tmp
    command: sh -c "npx prisma migrate deploy && npx prisma generate && node server.js"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fz152_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_APP_VERSION: "1.0.0"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fz152_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  fz152_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  tmp_data:
    driver: local
